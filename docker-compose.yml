version: "3.9"

# ============================================================
# OSCA System - Docker Compose (Development)
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f api    # Tail FastAPI logs
#   docker compose down -v        # Stop and remove volumes
# ============================================================

x-common-env: &common-env
  env_file: .env

services:

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: osca_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - api
    networks:
      - osca_net
    restart: unless-stopped

  # ── Next.js 15 Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: osca_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - osca_net
    restart: unless-stopped
    depends_on:
      - api

  # ── FastAPI Backend ────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: osca_api
    <<: *common-env
    volumes:
      - ./backend:/app
      - fr_models:/app/.insightface      # Persist downloaded FR models
    ports:
      - "8000:8000"
    networks:
      - osca_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ──────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: osca_celery
    <<: *common-env
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - fr_models:/app/.insightface
    networks:
      - osca_net
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ── Celery Beat (Scheduler) ────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: osca_celery_beat
    <<: *common-env
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    networks:
      - osca_net
    depends_on:
      - redis
    restart: unless-stopped

  # ── PostgreSQL 16 + pgvector ───────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: osca_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-osca_db}
      POSTGRES_USER: ${POSTGRES_USER:-osca_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - osca_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osca_user} -d ${POSTGRES_DB:-osca_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: osca_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - osca_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible Object Storage) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: osca_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"    # MinIO Console UI
    networks:
      - osca_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Named Volumes ──────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  fr_models:         # InsightFace/DeepFace model cache

# ── Networks ───────────────────────────────────────────────
networks:
  osca_net:
    driver: bridge
